---
- name: Otomatisasi Penginstalan Environment Data Science
  hosts: staging
  gather_facts: no 
  
  tasks:
    # Task 1: Raw Mode untuk update dan instalasi dasar Python
    - name: Pembaruan repositori dan instalasi dasar Python (Raw Mode)
      raw: |
        apt-get update && \
        apt-get install -y python3 python3-pip
      changed_when: true

    # Task 2: Pip Mode untuk install library dari requirements.txt
    - name: Instalasi pustaka Data Science dari requirements.txt
      pip:
        name:
          - pandas
          - psycopg2-binary
        executable: pip3
        extra_args: --break-system-packages
